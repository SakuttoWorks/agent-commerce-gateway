compatibility_date = "2026-03-03"
main = "src/index.ts"
name = "agent-commerce-gateway"

# Node.js compatibility flags for Hono & Standard Libraries
compatibility_flags = ["nodejs_compat"]

# =========================================================
# ▼ Routing Configuration (Custom Domain)
# =========================================================
routes = [
  {pattern = "api.sakutto.works", custom_domain = true},
]

# =========================================================
# ▼ Production Environment Variables
# =========================================================
[vars]
# Analytics Dataset Name
ANALYTICS_DATASET_NAME = "gateway_access_logs"

# Upstream Service URL (Layer B: Google Cloud Run)
CORE_API_URL = "https://agent-commerce-core-1003638625345.asia-northeast1.run.app"

# Environment Context (Strict Production Mode)
ENVIRONMENT = "production"

# =========================================================
# ▼ Infrastructure Optimization
# =========================================================
# Smart Placement: Optimizes latency by moving execution closer to data/services
[placement]
mode = "smart"

# Observability & Logging
[observability]
enabled = true

# Analytics Engine Binding
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "gateway_access_logs"
