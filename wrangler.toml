compatibility_date = "2026-03-03"
compatibility_flags = ["nodejs_compat"]
main = "src/index.ts"
name = "agent-commerce-gateway"

# =========================================================
# ▼ Routing Configuration (Custom Domain)
# =========================================================
routes = [
  {pattern = "api.sakutto.works", custom_domain = true},
]

# =========================================================
# ▼ Public Environment Variables (Non-sensitive)
# =========================================================
[vars]
# Upstream Service URL (Layer B: Google Cloud Run)
# Note: For local development, this is overridden by .dev.vars
CORE_API_URL = "https://agent-commerce-core-xd36uwybpa-an.a.run.app/"

# Environment Context (Strict Production Mode)
ENVIRONMENT = "production"

# [Priority 3] Monetization Configuration (Polar.sh)
# Product ID for metered billing
POLAR_ORGANIZATION_ID = "796ba33a-1265-445e-b034-6f3d3166095d"
POLAR_PRODUCT_ID = "a9a6d457-a2c6-4e1e-a2f8-60c6ef1cfcdd"

# =========================================================
# ▼ Infrastructure Optimization
# =========================================================
# Smart Placement: Optimizes latency by moving execution closer to upstream Core
[placement]
mode = "smart"

# Observability & Logging
[observability]
enabled = true

# =========================================================
# ▼ Bindings (Storage)
# =========================================================
# R2 Storage Binding for Privacy-Safe Audit Logs [Phase 3-5: Task 8]
[[r2_buckets]]
binding = "R2_LOGS"
bucket_name = "ghost-ship-logs"

# =========================================================
# ▼ Required Secrets (DO NOT HARDCODE HERE)
# =========================================================
# The following variables must be injected securely via Cloudflare Dashboard
# or by running the following Wrangler CLI commands:
#
# $ npx wrangler secret put INTERNAL_AUTH_SECRET
# $ npx wrangler secret put RESEND_API_KEY
# $ npx wrangler secret put POLAR_ACCESS_TOKEN
#
# [Secrets Dictionary]
# INTERNAL_AUTH_SECRET : Shared secret to authenticate Edge (Layer A) -> Core (Layer B)
# RESEND_API_KEY       : API Key for Resend to trigger async admin notifications
# POLAR_ACCESS_TOKEN   : [Priority 3] Polar.sh API Token for validation and events
